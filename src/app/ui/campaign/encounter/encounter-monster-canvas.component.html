<div class="canvas">
  <div
    class="chips"
    cdkDropList
    #chips="cdkDropList"
    cdkDropListOrientation="horizontal"
    [cdkDropListData]="chipCreatures"
    [cdkDropListConnectedTo]="[map]"
    (cdkDropListDropped)="onDrop($event)"
  >
    @for (creature of chipCreatures; track $index) {
      <creature-chip
        [creature]="creature"
        [editable]="editable()"
        cdkDrag
        [cdkDragDisabled]="!editable()"
        [cdkDragData]="creature"
        cdkDragBoundary=".canvas"
        (mousedown)="onDragMouse($event)"
        (click)="onSelect(creature)"
        (hpDiff)="onHpDiff(creature, $event)"
      ></creature-chip>
      <div *cdkDragPlaceholder class="placeholder"></div>
    }
  </div>

  <div
    class="map"
    cdkDropList
    #map="cdkDropList"
    [cdkDropListData]="mapCreatures"
    [cdkDropListConnectedTo]="[chips]"
    (cdkDropListDropped)="onDrop($event)"
    cdkDropListSortingDisabled="true"
  >
    @for (creature of mapCreatures; track $index) {
      <creature-chip
        #mapCreature
        [creature]="creature"
        [editable]="true"
        cdkDrag
        [cdkDragData]="creature"
        cdkDragBoundary=".canvas"
        [style.position]="'absolute'"
        [style.top.px]="creature.y"
        [style.left.px]="creature.x"
        (mousedown)="onDragMouse($event)"
        (click)="onSelect(creature)"
        (hpDiff)="onHpDiff(creature, $event)"
      ></creature-chip>
    }
  </div>
</div>
